name: Laravel Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'laravel-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'laravel-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: membermd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, openssl
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        working-directory: laravel-backend
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('laravel-backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: laravel-backend
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        working-directory: laravel-backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: laravel-backend
        run: php artisan key:generate

      - name: Run migrations
        working-directory: laravel-backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: membermd_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan migrate --force

      - name: Run tests
        working-directory: laravel-backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: membermd_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: php artisan test

      - name: Check code style
        working-directory: laravel-backend
        run: vendor/bin/pint --test
